<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title -->
    <title>Issues Tracker</title>

    <!-- DaisyUI CDN Link -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />

    <!-- Tailwind CSS Script -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Google Fonts Link -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- Font Awesome Link -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <!-- Navbar -->
    <header>
      <div class="navbar bg-base-100 shadow-sm flex justify-between">
        <div class="flex gap-2 items-center">
          <div class="w-9"><img src="assets/github-logo.png" class="w-full" alt="logo png" /></div>
          <h2 class="text-2xl font-semibold">GitHub Issues Tracker</h2>
        </div>
        <div class="flex gap-2">
          <input type="text" placeholder="Search" class="input input-bordered w-24 md:w-auto" />
          <button class="btn btn-primary">+ New Issue</button>
        </div>
      </div>
    </header>
    <main>
      <section class="flex container mx-auto justify-center mt-16">
        <div class="p-6 shadow-lg w-full rounded-lg flex gap-2">
          <button class="btn btn-primary px-10">All</button>
          <button class="btn px-10">Open</button>
          <button class="btn px-10">Closed</button>
        </div>
      </section>

      <section class="container shadow-lg mx-auto mt-4">
        <section class="flex container mx-auto justify-center">
          <div class="w-full shadow-sm p-6 rounded-lg flex items-center justify-between">
            <div class="flex items-center gap-2">
              <div class="bg-[#ECE4FF] rounded-full p-2">
                <img class="w-8" src="assets/Aperture.png" alt="" />
              </div>
              <div>
                <h2 class="text-2xl font-semibold">50 Issues</h2>
                <p class="text-gray-500">Try creating one</p>
              </div>
            </div>
            <div class="flex items-center justify-center gap-2">
              <div class="flex items-center gap-1">
                <span class="w-4 h-4 rounded-full bg-[#00A96E] inline-block"></span>
                <span class="text-sm leading-4">Open</span>
              </div>
              <div class="flex items-center gap-1">
                <span class="w-4 h-4 rounded-full bg-[#A855F7] inline-block"></span>
                <span class="text-sm leading-4">Closed</span>
              </div>
            </div>
          </div>
        </section>

        <section class="flex container mx-auto justify-center p-6">
          <div class="xl:grid grid-cols-4 lg:grid-cols-3 md:grid-cols-2 gap-4 w-full">
            <!-- Issue Card -->
            <div class="max-w-xs border-t-4 border-[#00A96E] rounded-lg shadow-lg">
              <!-- Issue Card header -->
              <div class="flex items-center justify-between mb-3 px-4 mt-3">
                <div class="img">
                  <img class="w-8" src="assets/Open-Status.png" alt="" />
                </div>
                <div class="bg-[#FEECEC] w-20 flex justify-center items-center rounded-full p-1">
                  <h4 class="font-medium text-sm text-red-500">High</h4>
                </div>
              </div>

              <!-- Issue Card Body -->
              <div class="px-4">
                <h2 class="font-semibold text-lg">Fix navigation menu on mobile devices</h2>
                <p class="text-sm text-gray-500 my-2 leading-relaxed">
                  The navigation menu doesn't collapse properly on mobile devices...
                </p>
                <div class="mt-3 gap-2">
                  <button class="btn btn-outline btn-error">
                    <i class="fa-solid fa-bug"></i> Bug
                  </button>
                  <button class="btn btn-outline btn-warning">
                    <i class="fa-solid fa-life-ring"></i> Help Wanted
                  </button>
                </div>
              </div>

              <!-- Issue Card Footer -->
              <div class="flex justify-between items-center pt-3 border-t mt-5 px-4">
                <p>created At:</p>
                <p>1/15/2024</p>
              </div>
              <div class="flex justify-between items-center px-4 pb-4">
                <p>updated At:</p>
                <p>1/15/2024</p>
              </div>
            </div>
          </div>
        </section>
      </section>
    </main>
  </body>
</html>
